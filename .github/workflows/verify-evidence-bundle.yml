name: Verify Evidence Bundle

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install verifier dependencies
        run: python -m pip install -r analysis/requirements.lock
      - name: Validate templates
        run: |
          python -m json.tool templates/scorebook_template.json >/tmp/scorebook.json
          python -m json.tool analysis/schemas/run_manifest.schema.json >/tmp/run_manifest_schema.json
          python -m json.tool analysis/schemas/scorebook.schema.json >/tmp/scorebook_schema.json
          python -m json.tool analysis/schemas/data_columns.schema.json >/tmp/data_columns_schema.json
          python - <<'PY'
          import csv
          from pathlib import Path
          cols = next(csv.reader([Path("templates/data_columns.csv").read_text().strip()]))
          dups = sorted({c for c in cols if cols.count(c) > 1})
          if dups:
              raise SystemExit("duplicate data columns: " + ", ".join(dups))
          PY
      - name: Run synthetic verifier tests
        run: PYTHONDONTWRITEBYTECODE=1 python -m unittest analysis/test_verify_scorebook.py
